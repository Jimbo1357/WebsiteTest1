<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero-Cost Pastebin</title>
    <style>
        body { font-family: monospace; background: #121212; color: #fff; padding: 20px; margin: 0; }
        textarea { width: 100%; height: 75vh; background: #1e1e1e; color: #fff; border: 1px solid #333; padding: 10px; font-family: monospace; box-sizing: border-box; resize: none; }
        button { background: #0070f3; color: white; border: none; padding: 12px 24px; cursor: pointer; margin-top: 15px; font-weight: bold; border-radius: 4px; }
        button:hover { background: #0051a8; }
        #raw-display { white-space: pre-wrap; font-family: monospace; display: none; }
    </style>
</head>
<body>

    <div id="creator-view">
        <h2>New Paste (No-DB edition)</h2>
        <textarea id="content" placeholder="Paste your code or text here..."></textarea>
        <button onclick="sharePaste()">Create Shareable Link</button>
    </div>

    <div id="raw-display"></div>

    <script>
        // Check the URL hash when the page loads
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash.substring(1);
            if (hash) {
                // Hide the creator layout, show the raw layout
                document.getElementById('creator-view').style.display = 'none';
                const display = document.getElementById('raw-display');
                display.style.display = 'block';

                try {
                    // Decode Base64 back to UTF-8 text safely
                    const decodedText = decodeURIComponent(atob(hash));
                    display.textContent = decodedText; // safely displays raw code/text
                } catch (e) {
                    display.innerText = "Error: Invalid or corrupted link.";
                }
            }
        });

        // Turn text into a safe URL hash and copy it
        function sharePaste() {
            const text = document.getElementById('content').value;
            if (!text) return alert("Please enter some text first!");

            try {
                // Encode UTF-8 text safely into a standard Base64 string
                const base64String = btoa(encodeURIComponent(text));
                
                // Set the link hash
                window.location.hash = base64String;
                
                // Copy new link to clipboard
                navigator.clipboard.writeText(window.location.href);
                alert("Link copied to clipboard! Share it anywhere.");
            } catch(e) {
                alert("Something went wrong encoding your text.");
            }
        }
    </script>
</body>
</html>
